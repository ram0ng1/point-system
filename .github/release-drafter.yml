name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
exclude-labels:
  - 'pular changelog'
categories:
  - title: '⚠️ Alterações Críticas (Breaking Changes)'
    labels:
      - 'BC'
  - title: '🔨 Melhoria'
    labels:
      - 'melhoria'
  - title: '🐞 Correções de Erros'
    labels:
      - 'correcao'
  - title: '🚀 Performance'
    labels:
      - 'performance'
  - title: '📖 Documentação'
    labels:
      - 'documentacao'
  - title: '♻️ Refatoração'
    labels:
      - 'refatoracao'
  - title: '📦 Dependências'
    labels:
      - 'dependencias'
  - title: '🌍 Traduções'
    labels:
      - 'traducao'
  - title: '🔧 Manutenção'
    labels:
      - 'manutencao'
version-resolver:
  major:
    labels:
      - 'BC'
  minor:
    labels:
      - 'melhoria'
  patch:
    labels:
      - 'correcao'
  default: patch
change-template: '- $TITLE (PR #$NUMBER) por @$AUTHOR'
template: |
  ## O que mudou na extensão Point System 🪙
  $CHANGES

  ## 📦 Como atualizar

  ```bash
  composer require ramon/point-system:$RESOLVED_VERSION
  php flarum cache:clear
  php flarum assets:publish
  ```
