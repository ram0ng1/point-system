name: Security Scan

# SAST para PHP (CodeQL não suporta) via Semgrep.
# Audits de dependências adicionais ficam no ci.yml (composer audit, npm audit, dependency-review).
on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  schedule:
    - cron: '0 7 * * 1'  # toda segunda, 07:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Semgrep (PHP + OWASP + secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF
      actions: read
    container:
      image: semgrep/semgrep:1.96.0
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Semgrep scan
        env:
          SEMGREP_RULES: >-
            p/php
            p/security-audit
            p/owasp-top-ten
            p/secrets
            p/javascript
        run: |
          set +e
          semgrep scan \
            --sarif --sarif-output=semgrep.sarif \
            --metrics=off
          EXIT=$?
          echo "Semgrep exit code: $EXIT"
          # Em PR/push/schedule não falhamos o job — relatório sobe ao Security tab.
          # Trocar para "exit $EXIT" quando o baseline estiver limpo.
          exit 0

      - name: Upload SARIF para o GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: semgrep.sarif
          category: semgrep
