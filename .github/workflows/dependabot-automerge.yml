name: Dependabot auto-merge

# Liga o auto-merge dos PRs do Dependabot de patch/minor — o GitHub funde
# sozinho QUANDO os checks obrigatórios (CI) passam. Major fica para revisão.
#
# Token:
#   • Por padrão usa o GITHUB_TOKEN, que NÃO pode mesclar PR que toca
#     .github/workflows/ (escopo `workflows`, não concedível). Esses bumps de
#     GitHub Action são pulados (merge manual).
#   • Se você criar o secret AUTOMERGE_TOKEN (PAT fine-grained com
#     Contents:write + Pull requests:write + Workflows:write), o workflow passa
#     a usá-lo e auto-mescla TAMBÉM os bumps de action.
#
# Requer nas Settings (não dá por workflow):
#   • General → "Allow auto-merge" LIGADO;
#   • Branch protection no branch default exigindo os checks da CI verdes —
#     é o que faz o auto-merge ESPERAR a CI;
#   • NÃO exigir review obrigatório (o token do Actions é proibido de aprovar).
on: pull_request_target

# §35.13 C1 — default-deny.
permissions: {}

concurrency:
  group: dependabot-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  automerge:
    name: Auto-merge (patch/minor)
    runs-on: ubuntu-latest
    # Só Dependabot. NÃO faz checkout do código do PR (pull_request_target roda
    # no contexto do base) — nenhum código não-confiável executa com o token.
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Metadados do update
        id: meta
        uses: dependabot/fetch-metadata@08eff52bf64351f401fb50d4972fa95b9f2c2d1b  # v2.4.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Habilitar auto-merge (patch + minor)
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          PAT: ${{ secrets.AUTOMERGE_TOKEN }}
          DEFAULT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          if [ -n "${PAT:-}" ]; then
            export GH_TOKEN="$PAT"
          else
            export GH_TOKEN="$DEFAULT_TOKEN"
            if gh pr view "$PR_URL" --json files --jq '.files[].path' | grep -q '^\.github/workflows/'; then
              echo "::notice::PR altera .github/workflows/ e não há AUTOMERGE_TOKEN — auto-merge pulado; mescle manualmente."
              exit 0
            fi
          fi
          gh pr merge --auto --squash --delete-branch "$PR_URL"
